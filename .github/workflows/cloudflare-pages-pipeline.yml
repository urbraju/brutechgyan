name: Cloudflare Pages Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate core files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          test -f functions/api/contact.js
          test -f wrangler.toml

      - name: Validate no unresolved analytics placeholder
        run: |
          if grep -R "YOUR_CLOUDFLARE_WEB_ANALYTICS_TOKEN" index.html; then
            echo "Replace analytics placeholder token or use automatic setup only."
            exit 1
          fi

  deploy:
    name: Deploy to Cloudflare Pages
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy .
            --project-name brutechgyan-site
            --branch ${{ github.ref_name }}
